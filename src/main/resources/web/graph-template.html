<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"></head>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1e1e1e;overflow:hidden;font-family:Consolas,monospace}
#container{width:100vw;height:100vh;cursor:grab}
#container:active{cursor:grabbing}
#graph{display:block}
#error{color:#f44747;padding:20px;display:none;white-space:pre-wrap}
#loading{color:#969696;padding:20px}
</style>
<body>
<div id="container">
<div id="loading">渲染中...</div>
<div id="graph"></div>
<div id="error"></div>
</div>
<script>
let scale=1,panX=0,panY=0,dragging=0,dx=0,dy=0;
var dot=String.raw`__DOT_CONTENT__`.trim();
if(!dot||dot==='__DOT_CONTENT__')document.getElementById('loading').textContent='无图形数据';
else try{
var viz=new Viz();
viz.renderSVGElement(dot).then(function(el){
document.getElementById('loading').style.display='none';
el.id='graph-svg';
el.style.width='100%';
el.style.height='100%';
document.getElementById('graph').appendChild(el);
apply();
}).catch(function(e){
document.getElementById('loading').style.display='none';
var err=document.getElementById('error');
err.style.display='block';
err.textContent='渲染失败: '+e+'\n\nDOT:\n'+dot;
});
}catch(e){
document.getElementById('loading').style.display='none';
var err=document.getElementById('error');
err.style.display='block';
err.textContent='viz.js不可用，请检查viz-standalone.js';
}
function apply(){var s=document.getElementById('graph-svg');if(s){s.style.transform='translate('+panX+'px,'+panY+'px) scale('+scale+')';s.style.transformOrigin='0 0'}}
document.getElementById('container').addEventListener('wheel',function(e){e.preventDefault();if(e.ctrlKey||e.metaKey){scale=Math.max(0.1,Math.min(5,scale+(e.deltaY>0?-0.1:0.1)))}else{panX-=e.deltaX;panY-=e.deltaY}apply()},{passive:false});
document.getElementById('container').addEventListener('mousedown',function(e){dragging=1;dx=e.clientX-panX;dy=e.clientY-panY});
document.addEventListener('mousemove',function(e){if(!dragging)return;panX=e.clientX-dx;panY=e.clientY-dy;apply()});
document.addEventListener('mouseup',function(){dragging=0});
</script>
</body></html>
